name = "wedding-kavari-searls-net-frontend"
main = "./src/entry.worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wedding"
# Same D1 as the rsvp worker; replace with the production id once known
# (see packages/rsvp/wrangler.toml for details).
database_id = "REPLACE_ME_WITH_REAL_ID"

[assets]
directory = "./dist/client"
binding = "ASSETS"
