name = "wedding-kavari-searls-net"
main = "./src/entry.worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wedding"
# Replace with the production D1 id from `wrangler d1 list`. Until set,
# `wrangler deploy` (and the Deploy / Preview workflows) will fail loudly.
# Local `wrangler dev` / `pnpm run dev` work without a real id thanks to
# miniflare; tests use the local sqlite at `../../.wrangler/state`.
database_id = "REPLACE_ME_WITH_REAL_ID"

[assets]
directory = "./dist/client"
binding = "ASSETS"
