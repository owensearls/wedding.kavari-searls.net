name: Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ALIAS: pr-${{ github.event.number }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: lts/*, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build rsc-utils (consumed via dist/ by rsvp + frontend)
        run: pnpm --filter rsc-utils build
      - run: pnpm build
      - id: rsvp
        name: Upload rsvp preview
        run: |
          set -o pipefail
          pnpm --filter rsvp exec wrangler versions upload -c dist/rsc/wrangler.json --preview-alias "$ALIAS" 2>&1 | tee /tmp/rsvp.log
          URL=$(grep -oE 'https://[A-Za-z0-9.-]+\.workers\.dev' /tmp/rsvp.log | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - id: frontend
        name: Upload frontend preview
        run: |
          set -o pipefail
          pnpm --filter frontend exec wrangler versions upload -c dist/rsc/wrangler.json --preview-alias "$ALIAS" 2>&1 | tee /tmp/frontend.log
          URL=$(grep -oE 'https://[A-Za-z0-9.-]+\.workers\.dev' /tmp/frontend.log | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && (steps.rsvp.outputs.url != '' || steps.frontend.outputs.url != '')
        with:
          header: preview-urls
          message: |
            ### Cloudflare preview deploys

            - **rsvp (admin)**: ${{ steps.rsvp.outputs.url || '_upload failed_' }}
            - **frontend**: ${{ steps.frontend.outputs.url || '_upload failed_' }}
