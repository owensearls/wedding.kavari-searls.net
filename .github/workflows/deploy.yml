name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: lts/*, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run
      - run: pnpm build
      - name: Inject production D1 database_id
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_DATABASE_ID }}" ]; then
            echo "::error::CLOUDFLARE_DATABASE_ID secret is required for deploy."
            exit 1
          fi
          sed -i "s/REPLACE_ME_WITH_REAL_ID/${{ secrets.CLOUDFLARE_DATABASE_ID }}/g" wrangler.toml
          grep database_id wrangler.toml
      - run: pnpm exec wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
