name: Deploy

on:
  workflow_run:
    workflows: [Check]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: lts/*, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build rsc-utils (consumed via dist/ by rsvp + frontend)
        run: pnpm --filter rsc-utils build
      - run: pnpm build
      - name: Apply D1 migrations
        run: pnpm --filter rsvp exec wrangler d1 migrations apply DB --remote
      # Deploy from the build artifact's generated wrangler.json so the worker
      # bundle's relative imports (rsc/index.js -> ../ssr/index.js, ../client/)
      # resolve. Deploying from the source wrangler.toml hits "No such module
      # '../ssr/index.js'" at runtime.
      # See https://developers.cloudflare.com/workers/vite-plugin/reference/api/
      - name: Deploy rsvp worker
        run: pnpm --filter rsvp exec wrangler deploy -c dist/rsc/wrangler.json
      - name: Deploy frontend worker
        run: pnpm --filter frontend exec wrangler deploy -c dist/rsc/wrangler.json
