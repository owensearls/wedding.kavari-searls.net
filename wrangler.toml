name = "wedding-kavari-searls-net"
main = "./src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wedding"
# database_id must be filled in per-environment; copy from existing wrangler config
# For local dev, miniflare accepts any UUID; for prod, replace with real id before deploy.
database_id = "11111111-1111-1111-1111-111111111111"

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
